name: "test"
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libvulkan-dev \
            libgl-dev \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libinput-dev \
            libseat-dev \
            libbz2-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests
        run: cargo test --all-features
